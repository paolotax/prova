:concurrency: 5
:queues:
  - mailers
  - default
  - bulk
  - ahoy
  - active_storage_analysis
  - active_storage_purge

:scheduler:
  :schedule:
    adozioni_scraper:
      cron: '0 */6 * * *'  # Esegue ogni 6 ore
      class: AdozioniScraperJob
      queue: default
      unique: true

    clean_orphaned_righe:
      cron: '0 3 1 * *'  # Esegue il 1° di ogni mese alle 3:00 AM
      class: CleanOrphanedRigheJob
      queue: default
      unique: true
      description: 'Pulisce le righe orfane (senza DocumentoRiga) e salva un backup in tmp/'

    auth_cleanup:
      cron: '0 4 * * *'  # Ogni giorno alle 4:00 AM
      class: AuthCleanupJob
      queue: default
      description: 'Pulisce sessioni e magic link scaduti'

    create_tappa_entries:
      cron: '0 6 * * *'  # Ogni giorno alle 6:00 AM
      class: CreateTappaEntriesJob
      queue: default
      description: 'Crea entry per le tappe di oggi'

    stats_healthcheck:
      cron: '15 4 * * *'  # Ogni giorno alle 4:15 AM (dopo auth_cleanup)
      class: Stats::HealthcheckJob
      queue: default
      unique: true
      description: 'Verifica esecuzione delle Stat e popola ultima_verifica/ultimo_errore'
