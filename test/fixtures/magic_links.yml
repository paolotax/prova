alice_sign_in:
  user: one
  code: <%= SecureRandom.alphanumeric(6).upcase %>
  purpose: sign_in
  expires_at: <%= 10.minutes.from_now %>
  ip_address: "127.0.0.1"

alice_expired:
  user: one
  code: <%= SecureRandom.alphanumeric(6).upcase %>
  purpose: sign_in
  expires_at: <%= 1.hour.ago %>
  ip_address: "127.0.0.1"

alice_used:
  user: one
  code: <%= SecureRandom.alphanumeric(6).upcase %>
  purpose: sign_in
  expires_at: <%= 10.minutes.from_now %>
  used_at: <%= 5.minutes.ago %>
  ip_address: "127.0.0.1"

bob_verification:
  user: two
  code: <%= SecureRandom.alphanumeric(6).upcase %>
  purpose: email_verification
  expires_at: <%= 20.minutes.from_now %>
  ip_address: "10.0.0.1"
